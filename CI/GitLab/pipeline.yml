# There are GitLab projects, whose repos are not meant to be cloned.
# Code in these repos is synched with corresponding subdirs of the [CMagneto project](https://gitlab.com/dishsoftware/cmagneto) repo
# and is pushed by a CMagneto CI Bot.
#
# Each of these test projects serves just as:
# 1) Registry of Docker images, related to the test project;
# 2) Runner of CI jobs, related to the test project;
# 3) Package registry for built installation packages of the test project.


variables:
  GIT_DEPTH: 1 # Get only the latest commit.


stages:
  - STAGE-run_unit_and_integration_tests
  # Seed project is in './SeedProject/'. Its pipeline is triggered only after a merge reaches the default branch.
  - STAGE-trigger__seed_project__pipeline
  - STAGE-wait__seed_project__pipeline

  # Test projects are in './tests/system/testProjects/'. Their pipelines are run only if there is a push into 'main'.
  # - STAGE-trigger__test_projects__pipelines
  # - STAGE-wait__test_projects__pipelines


run_unit_and_integration_tests:
  stage: STAGE-run_unit_and_integration_tests
  rules:
    # Allow explicit pipeline creation on any branch.
    - if: '$CI_COMMIT_MESSAGE =~ /RUN_CI_PIPELINE\s*$/'
      when: always

    # Run for release tags.
    - if: '$CI_COMMIT_TAG'
      when: always

    # Run in merge request pipelines that target the default branch.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH'
      when: on_success

    # Do not run in other pipelines, including the push pipeline created after merge.
    - when: never

  # Run `./CI/Docker/build_image__unit_and_integration_tests.py` to build and push the image.
  image: registry.gitlab.com/dishsoftware/cmagneto/unit_and_integration_tests:1.0.0

  script:
    - python3 ./tests/run_unit_and_integration_tests.py
  artifacts:
    when: always
    reports:
      junit: ./tests/summary/pytest-report.xml
    paths:
      - ./tests/summary/
    expire_in: 30 days


.seed_project__post_merge_rules:
  rules:
    # Run for release tags.
    - if: '$CI_COMMIT_TAG'
      when: always

    # Run only in the push pipeline created after merge to sync the actual default branch state.
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success

    - when: never


sync__seed_project__to__seed_project_repo:
  extends: .seed_project__post_merge_rules
  stage: STAGE-trigger__seed_project__pipeline
  needs:
    - job: run_unit_and_integration_tests
      artifacts: false
      optional: true # If the upstream job exists, wait for it. If it is not created, do not fail because of the missing dependency.

  # Run `./CI/Docker/build_image__for_repo_shenanigans.py` to build and push the image.
  image: registry.gitlab.com/dishsoftware/cmagneto/for_repo_shenanigans:1.0.0

  before_script:
    # "Source" the script, because otherwise the SSH-setup is done in a child process and has no effect on the job.
    - source ./CI/GitLab/add__test_project__private_key__to_ssh_agent.sh "CMAGNETO_CI_BOT__PRIVATE_SSH_KEY_BASE64__FOR_SEED_PROJECT_REPO"
  script:
    - python3 ./CI/GitLab/sync__test_projectroot__to__test_project_repo.py "SeedProject/" "git@gitlab.com:dishsoftware/contactholder.git"


trigger__seed_project__pipeline:
  extends: .seed_project__post_merge_rules
  stage: STAGE-trigger__seed_project__pipeline
  needs:
    - job: sync__seed_project__to__seed_project_repo
      artifacts: false
  trigger:
    project: dishsoftware/contactholder
    branch: $CI_COMMIT_REF_NAME
    strategy: depend


wait__seed_project__pipeline:
  extends: .seed_project__post_merge_rules
  stage: STAGE-wait__seed_project__pipeline
  needs:
    - job: trigger__seed_project__pipeline
      artifacts: false
  script:
    - echo "Seed project pipeline has finished."
