variables:
  GIT_DEPTH: 1 # Get only the latest commit.


workflow:
  rules:
    # If trigger is an assigned tag.
    - if: '$CI_COMMIT_TAG'
      when: always

    # If trigger is a commit into "main" branch.
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always

    # If trigger is a merge request into "main" branch.
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      when: always

    # If trigger is a commit with message starting with 'RUN_CI_PIPELINE'.
    - if: '$CI_COMMIT_MESSAGE =~ /^RUN_CI_PIPELINE/'
      when: always

    # In other cases do not create the pipeline.
    - when: never


stages:
  - build-test-package
  - upload_packages


# Job templates -----------------------------------------------------------------------------------------------------------------

# Generate .env file, which contains variables: REMOTE_IMAGE_NAME, IMAGE_VERSION, PLATFORM, ENV_TYPE, etc.
# These variables describe a remote Docker image, which was built using ${Dockerfile}.
.deduce_image__template:
  stage: build-test-package
  image: python:3
  variables:
    Dockerfile: "Dockerfile.Ubuntu24AMD__build" # Default value, should be overridden. The file must be located in ./CI/Docker/.
  script:
    - python3 ./CI/Docker/build_docker_image.py --file ./CI/Docker/${Dockerfile} --build_stage GenerateEnvFile
    - cat ./CI/Docker/.tmp/${Dockerfile}.env # Display the contents of the file.
  artifacts:
    reports:
      dotenv: ./CI/Docker/.tmp/${Dockerfile}.env
  rules:
    # Start the first job (i.e. the whole pipeline) manually, if trigger is a merge request of a forked project.
    # INTENT
    # Any GitLab user can create a fork project and then create a merge request, even if the user is not a Member of the original project.
    # To prevent abuse and wasting CI runners' quota, in such cases the pipeline is created, but requires a manual start.
    # Only Members of the original project can run a job manually.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_PROJECT_NAMESPACE != $CI_PROJECT_NAMESPACE' # $CI_MERGE_REQUEST_PROJECT_NAMESPACE only exists when the pipeline is triggered by a merge request.
      when: manual

    # Start automatically, if previous job has succeeded (default behaviour).
    # If there are no previous jobs, the condition is implicitly satisfied.
    - when: on_success


.build-test-package__template:
  stage: build-test-package
  # needs: [.deduce_image__template]
  image: ${REMOTE_IMAGE_NAME}:${IMAGE_VERSION}
  variables:
    TOOLSET: "UnixMakefiles_GCC" # Default value. May be overridden.
  script:
    - python3 build.py --toolset ${TOOLSET} --build_types Release

    # Append variables to inherited.env report artifact, in order to pass the variables to a following job. Newline in the end is added automatically.
    - echo "PLATFORM=${PLATFORM}" >> inherited.env
    - echo "TOOLSET=${TOOLSET}" >> inherited.env
  artifacts:
    when: always
    paths:
      - build/${TOOLSET}/Release/summary/test_report.xml
      - build/${TOOLSET}/Release/packages/** # Everything within ".../packages/" recursively.
    exclude:
      # Recursively exclude _CPack_Packages (the dir itself is also excluded). _CPack_Packages contains CPack temp files.
      - build/${TOOLSET}/Release/packages/_CPack_Packages/**
    reports:
      junit: build/${TOOLSET}/Release/summary/test_report.xml
      dotenv: inherited.env


# Upload generated packages to "GitLab generic packages repository".
.upload_packages__template:
  stage: upload_packages
  # needs: [.build-test-package__template]
  script:
    - |
      packagesDir="./build/${TOOLSET}/Release/packages"
      #  Iterate over all files recursively under packagesDir.
      for file in $(find "${packagesDir}" -type f); do
        # Compute file path relative to packagesDir.
        relative_path="${file#${packagesDir}/}"

        url="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_PATH}/${CI_COMMIT_REF_NAME}/${PLATFORM}/${TOOLSET}/${relative_path}"
        echo "Uploading ${file} to ${url}"
        curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "${file}" "${url}"
      done
# Job templates (END) -----------------------------------------------------------------------------------------------------------


# Jobs: Ubuntu 14 AMD ---------------------------
deduce_build_image__ubuntu24amd:
  extends: .deduce_image__template
  variables:
    Dockerfile: "Dockerfile.Ubuntu24AMD__build"


build-test-package__ubuntu24amd:
  extends: .build-test-package__template
  needs: [deduce_build_image__ubuntu24amd]


upload_packages__ubuntu24amd:
  extends: .upload_packages__template
  needs: [build-test-package__ubuntu24amd]
# Jobs: Ubuntu 14 AMD (END) ---------------------


# Jobs: Debian 12 AMD ---------------------------
deduce_build_image__debian12amd:
  extends: .deduce_image__template
  variables:
    Dockerfile: "Dockerfile.Debian12AMD__build"


build-test-package__debian12amd:
  extends: .build-test-package__template
  needs: [deduce_build_image__debian12amd]


upload_packages__debian12amd:
  extends: .upload_packages__template
  needs: [build-test-package__debian12amd]
# Jobs: Debian 12 AMD (END) ---------------------