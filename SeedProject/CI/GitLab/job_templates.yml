variables:
  GIT_DEPTH: 1 # Get only the latest commit.


.on_tag:
  rules:
    # If trigger is an assigned tag.
    - if: '$CI_COMMIT_TAG'
      when: always

    # In other cases don't run the job.
    - when: never
  artifacts:
    expire_in: never


.on_main:
  rules:
    # If trigger is:
    # - commit into $CI_DEFAULT_BRANCH branch;
    # - merge request into $CI_DEFAULT_BRANCH branch.
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH'
      when: always

    # In other cases don't run the job.
    - when: never
  artifacts:
    expire_in: 30 days


.on_branch:
  rules:
    # If trigger is NOT:
    # - assigned tag;
    # - commit into $CI_DEFAULT_BRANCH branch;
    # - merge request into $CI_DEFAULT_BRANCH branch.
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME != $CI_DEFAULT_BRANCH'
      when: always

    # In other cases don't run the job.
    - when: never
  artifacts:
    expire_in: 15 days


# Generate .env file, which contains variables: REMOTE_IMAGE_NAME, IMAGE_VERSION, PLATFORM, ENV_TYPE, etc.
# These variables describe a remote Docker image, which was built using ${Dockerfile}.
.deduce_image:
  stage: STAGE-build-test-package
  image: python:3
  variables:
    # The path must be and under `./CI/Docker/`. If relative, must be defined relative to the dir.
    Dockerfile: "./Dockerfile.Ubuntu24AMD__build" # Default value, should be overridden.
  script:
    - python3 ./CI/Docker/build_image.py --file ${Dockerfile} --build_stage GenerateEnvFile
    - cat ./CI/Docker/.tmp/${Dockerfile}.env # Display the contents of the file.
  artifacts:
    reports:
      dotenv: ./CI/Docker/.tmp/${Dockerfile}.env
  rules:
    # Start the first job (i.e. the whole job DAG) manually, if trigger is a merge request of a forked project.
    # INTENT
    # Any GitLab user can create a fork project and then create a merge request, even if the user is not a Member of the original project.
    # To prevent abuse and wasting CI runners' quota, in such cases the job DAG is created, but requires a manual start.
    # Only Members of the original project can run a job manually.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_PROJECT_NAMESPACE != null && $CI_MERGE_REQUEST_PROJECT_NAMESPACE != $CI_PROJECT_NAMESPACE' # $CI_MERGE_REQUEST_PROJECT_NAMESPACE only exists when the pipeline is triggered by a merge request.
      when: manual

    # Start automatically, if previous job has succeeded (default behaviour).
    # If there are no previous jobs, the condition is implicitly satisfied.
    - when: on_success


.build-test-package:
  stage: STAGE-build-test-package
  # needs: [.deduce_image] Template does not support "needs" attribute. Add the attribute in concrete jobs.
  image: ${REMOTE_IMAGE_NAME}:${IMAGE_VERSION}
  variables:
    BUILD_VARIANT: "UnixMakefiles_GCC" # Default value. May be overridden.
  script:
    - python3 build.py --build_variant ${BUILD_VARIANT} --build_types Release

    # Append variables to inherited.env report artifact, in order to pass the variables to a following job(s). Newline in the end is added automatically.
    - echo "PLATFORM=${PLATFORM}" >> inherited.env
    - echo "BUILD_VARIANT=${BUILD_VARIANT}" >> inherited.env
  artifacts:
    when: always
    paths:
      - build/${BUILD_VARIANT}/Release/summary/test_report.xml
      - build/${BUILD_VARIANT}/Release/packages/** # Everything within ".../packages/" recursively.
    exclude:
      # Recursively exclude _CPack_Packages (the dir itself is also excluded). _CPack_Packages contains CPack temp files.
      - build/${BUILD_VARIANT}/Release/packages/_CPack_Packages/**
    reports:
      junit: build/${BUILD_VARIANT}/Release/summary/test_report.xml
      dotenv: inherited.env


.on_tag__build-test-package:
  extends:
    - .on_tag
    - .build-test-package
  # needs: [.deduce_image] Template does not support "needs" attribute. Add the attribute in concrete jobs.


.on_main__build-test-package:
  extends:
    - .on_main
    - .build-test-package
  # needs: [.deduce_image] Template does not support "needs" attribute. Add the attribute in concrete jobs.


.on_branch__build-test-package:
  extends:
    - .on_branch
    - .build-test-package
  # needs: [.deduce_image] Template does not support "needs" attribute. Add the attribute in concrete jobs.


.install-run-package:
  stage: STAGE-install-run-package
  # needs: [.deduce_image, .build-test-package]
  image: ${REMOTE_IMAGE_NAME}:${IMAGE_VERSION}
  variables:
    BUILD_VARIANT: "UnixMakefiles_GCC" # Default value. May be overridden.
  script:
    - |
      packagesDir="./build/${BUILD_VARIANT}/Release/packages"
      packagePath="$(find "${packagesDir}" -type f -name '*.deb' | head -n 1)"
      if [ -z "${packagePath}" ]; then
        echo "No .deb package found under ${packagesDir}."
        exit 1
      fi
      export PACKAGE_PATH="${packagePath}"
      echo "Using package ${packagePath}"
      echo "PACKAGE_PATH=${PACKAGE_PATH}" >> inherited.env

    - |
      # Fail fast if the test image already contains any supported Qt 6 Core runtime package,
      # because this job is meant to prove the package manager pulls Qt in as a dependency.
      qtCoreRuntimePackages="libqt6core6 libqt6core6t64"
      for packageName in ${qtCoreRuntimePackages}; do
        if dpkg-query -W -f='${Status}\n' "${packageName}" 2>/dev/null | grep -q '^install ok installed$'; then
          echo "Qt runtime package ${packageName} is already installed before package installation."
          exit 1
        fi
      done

    - apt-get update
    - apt-get install -y "./${PACKAGE_PATH}"

    - |
      # Qt is currently expected to be supplied by the target machine via Debian package dependencies.
      # If the ContactHolder package is installed correctly with apt, a Qt 6 Core runtime package should be pulled in automatically.
      qtCoreRuntimePackages="libqt6core6 libqt6core6t64"
      qtCoreRuntimeDetected=""
      for packageName in ${qtCoreRuntimePackages}; do
        if dpkg-query -W -f='${Status}\n' "${packageName}" 2>/dev/null | grep -q '^install ok installed$'; then
          qtCoreRuntimeDetected="${packageName}"
          break
        fi
      done
      if [ -z "${qtCoreRuntimeDetected}" ]; then
        echo "No supported Qt 6 Core runtime package was installed with ${PACKAGE_PATH}."
        exit 1
      fi

    - |
      installedExecutablePath="$(dpkg-deb -c "${PACKAGE_PATH}" | awk '$6 ~ /^\.\/opt\/.*\/bin\/[^/]+$/ && firstMatch == "" { firstMatch = $6 } END { print firstMatch }')"
      if [ -z "${installedExecutablePath}" ]; then
        echo "Failed to detect installed executable path from ${PACKAGE_PATH}."
        exit 1
      fi
      export INSTALLED_EXECUTABLE_PATH="/${installedExecutablePath#./}"
      echo "INSTALLED_EXECUTABLE_PATH=${INSTALLED_EXECUTABLE_PATH}" >> inherited.env

    # The executable is a Qt GUI app, so it is run with the offscreen platform plugin to avoid requiring a display server.
    # A couple of stable startup lines are then checked:
    # - "zlib version:" is used as evidence that the bundled zlib runtime was found and loaded.
    # - "Qt widget styles count:" is used as evidence that Qt widgets were initialized successfully after apt-installed Qt runtime packages were pulled in.
    - QT_QPA_PLATFORM=offscreen timeout 30s "${INSTALLED_EXECUTABLE_PATH}" > package_run_output.txt 2>&1
    - cat package_run_output.txt
    - grep -q "zlib version:" package_run_output.txt
    - grep -q "Qt widget styles count:" package_run_output.txt
  artifacts:
    when: always
    paths:
      - package_run_output.txt
    reports:
      dotenv: inherited.env


.on_tag__install-run-package:
  extends:
    - .on_tag
    - .install-run-package
  # needs: [.deduce_image, .build-test-package] Template does not support "needs" attribute. Add the attribute in concrete jobs.


.on_main__install-run-package:
  extends:
    - .on_main
    - .install-run-package
  # needs: [.deduce_image, .build-test-package] Template does not support "needs" attribute. Add the attribute in concrete jobs.


.on_branch__install-run-package:
  extends:
    - .on_branch
    - .install-run-package
  # needs: [.deduce_image, .build-test-package] Template does not support "needs" attribute. Add the attribute in concrete jobs.


# Upload generated packages to "GitLab generic packages repository".
.upload_packages:
  stage: STAGE-upload_packages
  # needs: [.build-test-package]
  script:
    - |
      packagesDir="./build/${BUILD_VARIANT}/Release/packages"

      # Iterate over all files recursively under packagesDir.
      ## `find ... |`         — lists all files under packagesDir, one per line.
      ## `while read -r file` — reads each full line (i.e., full file path) without breaking on spaces or special characters.
      ## `-r`                 — tells read not to interpret backslashes (\) as escape characters. Safer for filenames like file\name.txt.
      find "${packagesDir}" -type f | while read -r file; do
        # Compute file path relative to packagesDir.
        relative_path="${file#${packagesDir}/}"

        url="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_PATH}/${CI_COMMIT_REF_NAME}/${PLATFORM}/${BUILD_VARIANT}/${relative_path}"
        echo "Uploading ${file} to ${url}"
        curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "${file}" "${url}"
      done


.on_tag__upload_packages:
  extends:
    - .on_tag
    - .upload_packages
  # needs: [.build-test-package] Template does not support "needs" attribute. Add the attribute in concrete jobs.


.on_main__upload_packages:
  extends:
    - .on_main
    - .upload_packages
  # needs: [.build-test-package] Template does not support "needs" attribute. Add the attribute in concrete jobs.


.on_branch__upload_packages:
  extends:
    - .on_branch
    - .upload_packages
  # needs: [.build-test-package] Template does not support "needs" attribute. Add the attribute in concrete jobs.


.estimate_test_coverage:
  stage: STAGE-test-coverage
  # needs: [.deduce_image] Template does not support "needs" attribute. Add the attribute in concrete jobs.
  image: ${REMOTE_IMAGE_NAME}:${IMAGE_VERSION}
  variables:
    BUILD_VARIANT: "UnixMakefiles_GCC" # Default value. May be overridden.
  script:
    - python3 build.py --build_variant ${BUILD_VARIANT} --build_types Debug --build_stage RunTests --coverage
    - echo "Test coverage $(cat build/${BUILD_VARIANT}/Debug/summary/test_coverage_report_percentage.txt 2>/dev/null || echo 'N/A')"
  coverage: '/Test coverage (\d+\.\d+%|N/A)/'
  rules:
    # If trigger is:
    # - commit into $CI_DEFAULT_BRANCH branch;
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always

    # In other cases don't run the job.
    - when: never
